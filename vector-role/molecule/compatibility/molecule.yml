---
dependency:
  name: galaxy

driver:
  name: podman

platforms:
  - name: vector-compatibility-ubuntu
    image: vector-tox-ubuntu:latest
    pre_build_image: true
    command: /bin/bash -c "while true; do sleep 10000; done"

provisioner:
  name: ansible
  config_options:
    defaults:
      remote_tmp: /tmp/.ansible-${USER}/tmp
      local_tmp: /tmp/.ansible-${USER}/local
      roles_path: ${MOLECULE_PROJECT_DIRECTORY}/..

verifier:
  name: ansible
